<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<center>
    <h2>Register Now</h2>

    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        <br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        <br><br>

        <label for="event">Select Event:</label><br>
        <select id="event" name="event" required>
            <option value="" disabled selected hidden>Select an event</option>
            <option>Source-O-Code</option>
            <option>Code-Blooded</option>
            <option>Quiz-O-Codigo</option>
            <option>Innovate-X</option>
            <option>Hackathon</option>
        </select>
        <br><br>

        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>
</center>

</body>
</html>
